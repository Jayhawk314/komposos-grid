<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" style="max-width:100%;height:auto;background:#ffffff"><defs><marker id="arrow" viewBox="0 0 14 14" markerWidth="16" markerHeight="16" refX="12" refY="7" orient="auto"><path d="M0,0 L14,7 L0,14 Z" fill="#1f6feb"/></marker></defs><rect width="1120" height="720" fill="#ffffff"/><text x="42" y="38" fill="#17202a" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="start">The grid problem is a system, not a pile of charts</text><text x="42" y="66" fill="#5b6673" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">Read left to right: pressure enters the system, bottlenecks limit movement, symptoms appear, and customers pay.</text><rect x="42" y="128" width="218" height="108" rx="10" fill="#f8fbff" stroke="#bcd6ff" stroke-width="1.5"/><text x="58" y="156" fill="#17202a" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="start">1. Demand pressure</text><text x="58" y="184" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">4,294 TWh in 2025; +215</text><text x="58" y="203" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">since 2023</text><rect x="310" y="128" width="218" height="108" rx="10" fill="#f8fbff" stroke="#bcd6ff" stroke-width="1.5"/><text x="326" y="156" fill="#17202a" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="start">2. Power must move</text><text x="326" y="184" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">494 TWh crossed operator</text><text x="326" y="203" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">borders in 2025</text><rect x="578" y="128" width="238" height="108" rx="10" fill="#f8fbff" stroke="#bcd6ff" stroke-width="1.5"/><text x="594" y="156" fill="#17202a" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="start">3. Bottlenecks bind</text><text x="594" y="184" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">top 10 constraints carry</text><text x="594" y="203" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">33-38% of severity</text><rect x="866" y="128" width="220" height="132" rx="10" fill="#f8fbff" stroke="#bcd6ff" stroke-width="1.5"/><text x="882" y="156" fill="#17202a" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="start">6. Customers pay</text><text x="882" y="184" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">$251M measured/proxy</text><text x="882" y="203" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">waste; $4,369M/yr</text><text x="882" y="222" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">reliability floor</text><rect x="578" y="340" width="238" height="112" rx="10" fill="#f8fbff" stroke="#bcd6ff" stroke-width="1.5"/><text x="594" y="368" fill="#17202a" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="start">4. Energy is stranded</text><text x="594" y="396" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">13.03 TWh curtailed in</text><text x="594" y="415" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">CAISO + SPP</text><rect x="310" y="340" width="218" height="112" rx="10" fill="#f8fbff" stroke="#bcd6ff" stroke-width="1.5"/><text x="326" y="368" fill="#17202a" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="start">5. New supply pipeline</text><text x="326" y="396" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">only 16.5% of decided</text><text x="326" y="415" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">queue projects completed</text><rect x="224" y="554" width="672" height="96" rx="10" fill="#f8fbff" stroke="#bcd6ff" stroke-width="1.5"/><text x="240" y="582" fill="#17202a" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="start">What this points to</text><text x="240" y="610" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">target the binding places: transmission, interconnection reform, storage, and</text><text x="240" y="629" fill="#17202a" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">flexible demand</text><line x1="260" y1="182" x2="310" y2="182" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="528" y1="182" x2="578" y2="182" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="816" y1="182" x2="866" y2="182" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="697" y1="236" x2="697" y2="340" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="816" y1="396" x2="866" y2="232" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="419" y1="236" x2="419" y2="340" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="528" y1="396" x2="578" y2="396" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="419" y1="452" x2="419" y2="554" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="697" y1="452" x2="697" y2="554" stroke="#1f6feb" stroke-width="2.4" marker-end="url(#arrow)"/><text x="42" y="690" fill="#5b6673" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="400" text-anchor="start">Numbers and charts are evidence for the boxes. This graph is the story.</text></svg>